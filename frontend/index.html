<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Data Transformer</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-layers-half logo-icon"></i>
            <h2>EightFold</h2>
        </div>
        
        <nav class="sidebar-nav">
            <a href="#dashboard" class="nav-link active" data-target="dashboard">
                <i class="bi bi-grid-1x2"></i> Dashboard
            </a>
            <a href="#datasources" class="nav-link" data-target="datasources">
                <i class="bi bi-cloud-upload"></i> Data Sources
            </a>
            <a href="#candidates" class="nav-link" data-target="candidates">
                <i class="bi bi-people"></i> Candidates
            </a>
            <a href="#analytics" class="nav-link" data-target="analytics">
                <i class="bi bi-bar-chart"></i> Analytics
            </a>
            <a href="#provenance" class="nav-link" data-target="provenance">
                <i class="bi bi-diagram-3"></i> Provenance
            </a>
            <a href="#jsonviewer" class="nav-link" data-target="jsonviewer">
                <i class="bi bi-braces"></i> JSON Viewer
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <div class="version-badge">v2.0.0-SPA</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="top-header">
            <div class="header-titles">
                <h1>Candidate Data Transformer</h1>
                <p class="subtitle">Deterministic ETL Pipeline Visualizer</p>
            </div>
            <div class="header-actions">
                <span id="pipeline-status" class="status-badge loading">
                    <i class="bi bi-arrow-repeat spin"></i> Loading Payload
                </span>
            </div>
        </header>

        <!-- View Container -->
        <div id="app-content" class="view-container">
            <!-- Dynamic JavaScript Views Injected Here -->
        </div>
    </main>

    <!-- Global Modal Overlay (Used by Candidate Explorer) -->
    <div id="global-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="document.getElementById('global-modal').classList.remove('active')">
                <i class="bi bi-x-lg"></i>
            </button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Application Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/datasources.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/candidates.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/provenance.js"></script>
    <script src="js/jsonviewer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
